<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Save-IT 점주용 스캐너</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.1/dist/mqtt.min.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js';document.head.appendChild(s);"></script>
<style>
:root{
  --primary:#13c56b;--primary-d:#0a9d52;--primary-l:#3fe28c;
  --mint:#eafff4;--bg:#eef3f0;--card:#fff;--text:#16241d;--sub:#7c8b84;--alert:#ff5a5f;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(circle at 30% 0%,#15291e,#08130d 70%);min-height:100vh;display:flex;justify-content:center;padding:0}
.wrap{width:100%;max-width:640px;background:var(--bg);min-height:100vh;box-shadow:0 0 80px rgba(0,0,0,.5);padding-bottom:40px}
@media(min-width:560px){ .wrap{max-width:820px} }

.header{background:linear-gradient(135deg,#0fb863 0%,var(--primary-d) 70%,#08894a);color:#fff;padding:24px 22px 28px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50px;right:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%);border-radius:50%}
.header>*{position:relative;z-index:1}
.header .logo{font-size:21px;font-weight:900;display:flex;align-items:center;gap:8px}
.header .logo i{background:#fff;color:var(--primary);width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 6px 14px rgba(0,0,0,.2)}
.header .role{margin-top:5px;font-size:12.5px;opacity:.9}
.conn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;background:rgba(255,255,255,.18);padding:6px 11px;border-radius:20px;margin-top:13px;backdrop-filter:blur(4px)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#cfd8d3}
.conn-dot.online{background:#aaffcc;box-shadow:0 0 8px #aaffcc;animation:pulse 1.5s infinite}
.conn-dot.connecting{background:#ffb300}
@keyframes pulse{50%{opacity:.35}}

.section{padding:20px 20px 0}
.section h2{font-size:14px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.section h2 i{color:var(--primary)}
.section h2 .hint{margin-left:auto;font-size:11px;font-weight:400;color:var(--sub)}

/* ===== 스캐너 뷰포트 ===== */
.scanner{margin:0 20px;background:radial-gradient(circle at 50% 40%,#15302244,#0c1a13),#0c1a13;border-radius:22px;height:230px;position:relative;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 12px 28px rgba(0,0,0,.25);border:1px solid rgba(63,226,140,.18)}
.scanner .corner{position:absolute;width:34px;height:34px;border:3px solid var(--primary-l);opacity:.85}
.scanner .corner.tl{top:16px;left:16px;border-right:none;border-bottom:none;border-radius:8px 0 0 0}
.scanner .corner.tr{top:16px;right:16px;border-left:none;border-bottom:none;border-radius:0 8px 0 0}
.scanner .corner.bl{bottom:16px;left:16px;border-right:none;border-top:none;border-radius:0 0 0 8px}
.scanner .corner.br{bottom:16px;right:16px;border-left:none;border-top:none;border-radius:0 0 8px 0}
.scanner .target{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#6fae8e;text-align:center;gap:8px}
.scanner .target .big{font-size:64px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5));transition:.2s}
.scanner .target .cap{font-size:12.5px;color:#8fc5aa;font-weight:500;max-width:70%}
.scanner .target .name{font-size:15px;color:#eafff4;font-weight:700}
/* 레이저 라인 */
.laser{position:absolute;left:8%;right:8%;height:3px;background:linear-gradient(90deg,transparent,var(--primary-l),#fff,var(--primary-l),transparent);box-shadow:0 0 14px 3px rgba(63,226,140,.7);top:50%;opacity:0;border-radius:3px}
.scanner.scanning .laser{opacity:1;animation:laser 1s ease-in-out}
@keyframes laser{0%{top:16%}50%{top:84%}100%{top:16%}}
.scanner.scanning .big{transform:scale(1.12)}
/* 스캔 성공 플래시 */
.scanner .flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(63,226,140,.5),transparent 60%);opacity:0;pointer-events:none}
.scanner.done .flash{animation:okflash .6s}
@keyframes okflash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
/* 그리드 스캔라인 질감 */
.scanner::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 2px,transparent 2px 4px);pointer-events:none}

/* ===== 대시보드 ===== */
.dash{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 20px}
.stat{background:var(--card);border-radius:16px;padding:14px;box-shadow:0 8px 20px rgba(0,0,0,.06);position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:-18px;right:-12px;width:54px;height:54px;border-radius:50%;background:var(--mint)}
.stat .ic{position:relative;z-index:1;color:var(--primary-d);font-size:15px}
.stat .v{position:relative;z-index:1;font-size:22px;font-weight:900;color:var(--text);margin-top:7px;line-height:1}
.stat .l{position:relative;z-index:1;font-size:11px;color:var(--sub);font-weight:700;margin-top:4px}

.pos-btnrow{display:flex;gap:8px;margin:14px 20px 0}
.bulk-btn,.refresh-btn{flex:1;background:#0e2017;color:#eafff4;border:none;padding:13px;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.refresh-btn{background:var(--card);color:var(--primary-d);border:1.5px solid #d8e8e0}
.bulk-btn:active,.refresh-btn:active{transform:scale(.98)}
.bulk-btn:disabled,.refresh-btn:disabled{opacity:.5}

.scan-status{margin:12px 20px 0;text-align:center;font-size:12.5px;color:var(--sub);min-height:18px;font-weight:700}
.scan-status.ok{color:var(--primary-d)}

/* ===== POS 연동 상품 리스트 ===== */
.poslist{display:flex;flex-direction:column;gap:10px}
.pos-card{background:var(--card);border-radius:16px;padding:13px 14px;box-shadow:0 8px 20px rgba(0,0,0,.06);position:relative;border:2px solid transparent;transition:.18s}
.pos-card.applied{border-color:var(--primary);background:var(--mint)}
.pos-top{display:flex;align-items:center;gap:10px}
.pos-top .emo{font-size:26px;flex-shrink:0}
.pos-top .meta{min-width:0;flex:1}
.pos-top .nm{font-size:13.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pos-top .sub{font-size:11px;color:var(--sub);margin-top:2px}
.pos-top .dday{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:8px;background:#fff0ec;color:var(--alert);white-space:nowrap}
.pos-top .dday.warn{background:#fff7e0;color:#b8860b}
.pos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}
.pos-grid .f label{font-size:10px;color:var(--sub);font-weight:700;display:block;margin-bottom:4px}
.pos-grid .f input{width:100%;border:1.5px solid #e2eae6;border-radius:9px;padding:8px 9px;font-size:12.5px;color:var(--text);background:#fafdfb;outline:none}
.pos-grid .f input:focus{border-color:var(--primary)}
.pos-actions{display:flex;align-items:center;gap:8px;margin-top:10px}
.pos-actions label{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--sub);font-weight:700}
.pos-actions input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary)}
.pos-apply{margin-left:auto;background:#0e2017;color:#eafff4;border:none;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px}
.pos-apply:active{transform:scale(.96)}

.log{margin:20px;background:#0e2017;border-radius:16px;padding:14px 16px;max-height:180px;overflow-y:auto}
.log h3{color:#9fb3a9;font-size:11px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.log-item{color:#e8f5ee;font-size:12.5px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;gap:8px}
.log-item:last-child{border:none}
.log-item .t{color:#5d7a6c;font-size:11px;flex-shrink:0}
.log-empty{color:#5d7a6c;font-size:12px;text-align:center;padding:10px 0}
</style>
<style>
/* ===== UI 폴리시 오버라이드 (실제 앱 스타일) ===== */
*{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif}
:root{--primary:#10c26a;--primary-d:#079451;--primary-l:#43e693;--bg:#f2f6f3;--text:#101d16;--sub:#77857d}
body{background:radial-gradient(120% 80% at 30% -10%,#173423,#07110b 75%)}
.wrap{box-shadow:0 0 100px rgba(0,0,0,.55)}
.header{background:linear-gradient(140deg,#12ce74 0%,#0aa25a 55%,#067a43);padding:26px 22px 30px;box-shadow:0 10px 34px rgba(7,148,81,.28)}
.header .logo{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header .logo i{width:36px;height:36px;border-radius:12px;font-size:16px;box-shadow:0 8px 18px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.5)}
.header .role{font-weight:500;letter-spacing:-.2px}
.conn{border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.16);backdrop-filter:blur(8px)}
.section h2{font-size:14.5px;font-weight:800;letter-spacing:-.3px}
.stat{border-radius:20px;padding:16px 15px;box-shadow:0 10px 26px rgba(13,42,27,.08);border:1px solid #e8efe9}
.stat::after{width:64px;height:64px;top:-22px;right:-16px;background:linear-gradient(140deg,#eafff4,#d8f7e7)}
.stat .v{font-size:23px;font-weight:800;letter-spacing:-.6px}
.stat .l{font-weight:600}
.scanner{border-radius:26px;box-shadow:inset 0 0 50px rgba(0,0,0,.65),0 18px 40px rgba(0,0,0,.3);border:1px solid rgba(67,230,147,.22)}
.bulk-btn{background:linear-gradient(140deg,#123324,#0b2015);border-radius:16px;box-shadow:0 10px 24px rgba(9,28,17,.35);font-weight:800;letter-spacing:-.2px}
.refresh-btn{border-radius:16px;border:1.5px solid #d3e6da;box-shadow:0 8px 20px rgba(13,42,27,.07);font-weight:800;letter-spacing:-.2px}
.pos-card{border-radius:20px;box-shadow:0 10px 26px rgba(13,42,27,.08);border:2px solid #edf3ee;padding:15px 16px}
.pos-card.applied{border-color:var(--primary);box-shadow:0 12px 30px rgba(16,194,106,.16)}
.pos-top .emo{width:44px;height:44px;border-radius:14px;background:linear-gradient(140deg,#eafff4,#d8f7e7);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:inset 0 1px 0 #fff}
.pos-top .nm{font-size:14px;font-weight:800;letter-spacing:-.3px}
.pos-top .dday{border-radius:10px;padding:4px 9px;font-weight:800}
.pos-grid .f input{border-radius:11px;padding:10px;border:1.5px solid #e2ece5;font-weight:600}
.pos-grid .f input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(16,194,106,.14)}
.pos-apply{background:linear-gradient(140deg,#14d478,#079451);border-radius:12px;padding:9px 16px;box-shadow:0 8px 18px rgba(16,194,106,.32);font-weight:800}
.pos-apply:disabled{background:#c9d6cd;box-shadow:none}
.log{border-radius:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 12px 28px rgba(0,0,0,.25)}
.scan-status{font-weight:700;letter-spacing:-.2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo"><i class="fas fa-store"></i> Save-IT 점주용</div>
    <div class="role">POS 연동으로 유통기한 임박 상품을 자동 감지합니다</div>
    <div class="conn"><span class="conn-dot connecting" id="connDot"></span><span id="connText">연결 중</span></div>
  </div>

  <!-- 실시간 대시보드 -->
  <div class="section"><h2><i class="fas fa-chart-simple"></i> 오늘의 마감 현황</h2></div>
  <div class="dash">
    <div class="stat"><div class="ic"><i class="fas fa-barcode"></i></div><div class="v" id="stScan">0</div><div class="l">오늘 스캔 건수</div></div>
    <div class="stat"><div class="ic"><i class="fas fa-box"></i></div><div class="v" id="stQty">0</div><div class="l">마감 처리 상품</div></div>
    <div class="stat"><div class="ic"><i class="fas fa-won-sign"></i></div><div class="v" id="stRev">0원</div><div class="l">회수한 매출</div></div>
    <div class="stat"><div class="ic"><i class="fas fa-leaf"></i></div><div class="v" id="stCo2">0kg</div><div class="l">줄인 음식물 탄소</div></div>
  </div>

  <!-- 스캐너 뷰포트 -->
  <div class="section"><h2><i class="fas fa-barcode"></i> 마감 스캐너 <span class="hint">적용 버튼을 누르면 전송돼요</span></h2></div>
  <div class="scanner" id="scanner">
    <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
    <div class="laser"></div>
    <div class="flash"></div>
    <div class="target" id="target">
      <div class="big" id="scanEmoji"><i class="fas fa-qrcode" style="opacity:.5"></i></div>
      <div class="cap" id="scanCap">아래 상품 목록에서 할인가·수량·시간을<br>입력하고 적용 버튼을 누르세요</div>
    </div>
  </div>
  <div class="scan-status" id="scanStatus">대기 중</div>

  <!-- POS 연동: 유통기한 임박 상품 자동 리스트업 -->
  <div class="section">
    <h2><i class="fas fa-tower-broadcast"></i> 유통기한 임박 상품 <span class="hint" id="shelfCnt">POS 연동 · 0건</span></h2>
  </div>
  <div class="pos-btnrow">
    <button class="refresh-btn" id="refreshBtn" onclick="refreshFeed()"><i class="fas fa-rotate"></i> 오늘의 할인 대상 새로 받기</button>
    <button class="bulk-btn" id="bulkBtn" onclick="scanAll()"><i class="fas fa-bolt"></i> 선택 상품 일괄 적용</button>
  </div>
  <div class="section">
    <div class="poslist" id="shelf"></div>
  </div>

  <div class="log">
    <h3><i class="fas fa-clock-rotate-left"></i> 스캔 기록</h3>
    <div id="logList"><div class="log-empty">아직 스캔 기록이 없습니다</div></div>
  </div>
</div>

<script>
const MQTT_BROKER="wss://broker.emqx.io:8084/mqtt";
const MQTT_TOPIC ="saveit/store/gyeyang/scan";
const STORE_NAME ="GS25 계양구청점";
let mqttClient=null, busy=false;
let stat={scan:0, qty:0, rev:0};
function wonShort(n){ return n>=10000 ? (n/10000).toFixed(1).replace(/\.0$/,'')+"만원" : Number(n).toLocaleString('ko-KR')+"원"; }
function bumpStat(p){
  stat.scan++; stat.qty+=p.discQty; stat.rev+=p.discPrice*p.discQty;
  document.getElementById('stScan').textContent=stat.scan;
  document.getElementById('stQty').textContent=stat.qty+"개";
  document.getElementById('stRev').textContent=wonShort(stat.rev);
  document.getElementById('stCo2').textContent=(stat.qty*0.25).toFixed(1)+"kg";
}

const CAT_EMOJI={ "도시락":"🍱","삼각김밥":"🍙","김밥":"🍙","샌드위치":"🥪","빵":"🥐","우유":"🥛","요거트":"🥛","커피":"☕" };
function emojiFor(cat,name){
  if(CAT_EMOJI[cat]) return CAT_EMOJI[cat];
  for(const k in CAT_EMOJI){ if(name&&name.indexOf(k)>=0) return CAT_EMOJI[k]; }
  return "🍽️";
}
function won(n){ return Number(n).toLocaleString('ko-KR')+"원"; }

/* POS 본사 시스템에 등록된 전체 상품 풀 (시뮬레이션) */
const POS_POOL=[
  {name:"참치마요 삼각김밥",cat:"삼각김밥",orig:3600,stock:3},
  {name:"햄치즈 샌드위치",cat:"샌드위치",orig:3900,stock:2},
  {name:"그릭요거트",cat:"우유",orig:3000,stock:4},
  {name:"불고기 도시락",cat:"도시락",orig:5500,stock:2},
  {name:"명란마요 삼각김밥",cat:"삼각김밥",orig:3700,stock:5},
  {name:"BLT 샌드위치",cat:"샌드위치",orig:4200,stock:3},
  {name:"단백질 바나나우유",cat:"우유",orig:2500,stock:6},
  {name:"제육볶음 도시락",cat:"도시락",orig:5800,stock:2},
  {name:"크루아상",cat:"빵",orig:2800,stock:4},
  {name:"아메리카노",cat:"커피",orig:2200,stock:5}
];

/* 오늘의 할인 대상 (POS에서 유통기한 임박 상품만 뽑아온 결과) */
let PRODUCTS=[];

function pullFromPOS(){
  const pool=[...POS_POOL].sort(()=>Math.random()-0.5);
  const n=3+Math.floor(Math.random()*3);
  return pool.slice(0,n).map(base=>{
    const p={...base, expiryHours: +(0.5+Math.random()*8).toFixed(1)};
    p.discPrice=suggestPrice(p.orig); p.discQty=p.stock; p.discHours=p.expiryHours; p.applied=false;
    return p;
  });
}

function refreshFeed(){
  if(busy) return;
  PRODUCTS=pullFromPOS();
  renderShelf();
}

PRODUCTS=pullFromPOS();

function setConn(state,text){ document.getElementById('connDot').className='conn-dot '+state; document.getElementById('connText').textContent=text; }

let mqttWaitTries=0;
function initMqtt(){
  if(typeof mqtt==='undefined'){
    setConn('connecting','라이브러리 로드 중');
    if(mqttWaitTries++<40){ setTimeout(initMqtt,300); return; }
    setConn('','네트워크 연결 필요'); return;
  }
  setConn('connecting','연결 중');
  try{
    mqttClient=mqtt.connect(MQTT_BROKER,{clientId:'saveit-owner-'+Math.random().toString(16).substr(2,8),reconnectPeriod:2000,connectTimeout:8000});
    mqttClient.on('connect',()=>setConn('online','발행 준비 완료'));
    mqttClient.on('reconnect',()=>setConn('connecting','재연결 중'));
    mqttClient.on('offline',()=>setConn('','오프라인'));
    mqttClient.on('error',()=>setConn('','연결 오류'));
  }catch(e){ setConn('','연결 불가'); }
}

function ddayLabel(hours){
  if(hours<=4) return {cls:'dday',txt:'D-'+hours.toFixed(1).replace(/\.0$/,'')+'h 임박'};
  return {cls:'dday warn',txt:'D-'+hours.toFixed(1).replace(/\.0$/,'')+'h'};
}

function suggestPrice(orig){ return Math.round(orig*0.5/100)*100; }

function renderShelf(){
  const applied=PRODUCTS.filter(p=>p.applied).length;
  document.getElementById('shelfCnt').textContent="POS 연동 · "+PRODUCTS.length+"건 ("+applied+"건 적용)";
  document.getElementById('shelf').innerHTML=PRODUCTS.map((p,i)=>{
    const dd=ddayLabel(p.expiryHours);
    return `
    <div class="pos-card${p.applied?' applied':''}" id="shelf${i}">
      <div class="pos-top">
        <span class="emo">${emojiFor(p.cat,p.name)}</span>
        <div class="meta">
          <div class="nm">${p.name}</div>
          <div class="sub">정상가 ${won(p.orig)} · 재고 ${p.stock}개</div>
        </div>
        <span class="${dd.cls}">${dd.txt}</span>
      </div>
      <div class="pos-grid">
        <div class="f"><label>할인가(원)</label><input type="number" id="disc${i}" value="${p.discPrice}" step="100"></div>
        <div class="f"><label>수량</label><input type="number" id="qty${i}" value="${p.discQty}" min="1" max="${p.stock}"></div>
        <div class="f"><label>진행시간(h)</label><input type="number" id="hrs${i}" value="${p.discHours}" step="0.5" min="0.5"></div>
      </div>
      <div class="pos-actions">
        <label><input type="checkbox" id="chk${i}" ${p.applied?'disabled':''}> 선택</label>
        <button class="pos-apply" onclick="scanProduct(${i})" ${p.applied?'disabled':''}><i class="fas fa-bolt"></i> ${p.applied?'적용됨':'선택 적용'}</button>
      </div>
    </div>`;
  }).join('');
}

/* ===== 개별 상품 할인 적용 (스캐너 애니메이션 + MQTT 발행) ===== */
function scanProduct(i){
  if(busy) return;
  const p=PRODUCTS[i];
  if(p.applied) return;
  p.discPrice=parseInt(document.getElementById('disc'+i).value)||suggestPrice(p.orig);
  p.discQty=Math.min(parseInt(document.getElementById('qty'+i).value)||1,p.stock);
  p.discHours=parseFloat(document.getElementById('hrs'+i).value)||1;
  busy=true;
  const sc=document.getElementById('scanner');
  document.getElementById('scanEmoji').textContent=emojiFor(p.cat,p.name);
  document.getElementById('scanCap').innerHTML=`<span class="name">${p.name}</span>`;
  const st=document.getElementById('scanStatus'); st.className='scan-status'; st.textContent='POS 데이터 적용 중...';
  sc.classList.remove('done'); sc.classList.add('scanning');
  beep(660);

  setTimeout(()=>{
    sc.classList.remove('scanning'); sc.classList.add('done');
    p.applied=true;
    publish(p);
    beep(1320);
    st.className='scan-status ok'; st.textContent='✓ 소비자 화면으로 전송 완료!';
    addLog(p);
    bumpStat(p);
    busy=false;
    renderShelf();
    setTimeout(()=>{ st.className='scan-status'; st.textContent='대기 중'; },2600);
  },1050);
}

/* 체크박스로 선택된 상품을 순차적으로 일괄 적용 (없으면 전체 적용) */
function scanAll(){
  if(busy || !PRODUCTS.length) return;
  let targets=PRODUCTS.map((p,i)=>i).filter(i=>!PRODUCTS[i].applied && document.getElementById('chk'+i).checked);
  if(!targets.length) targets=PRODUCTS.map((p,i)=>i).filter(i=>!PRODUCTS[i].applied);
  if(!targets.length) return;
  const btn=document.getElementById('bulkBtn'); btn.disabled=true;
  let k=0;
  const next=()=>{
    if(k>=targets.length){ btn.disabled=false; return; }
    scanProduct(targets[k]);
    k++;
    setTimeout(next,1500);
  };
  next();
}

function publish(p){
  const payload={
    store:STORE_NAME, product:p.name, category:p.cat,
    price:won(p.discPrice), origPrice:won(p.orig),
    qty:p.discQty, expiry:expiryText(p.discHours), seconds:Math.round(p.discHours*3600),
    dist:"도보 4분 · 320m", scannedAt:new Date().toLocaleTimeString('ko-KR')
  };
  if(mqttClient && mqttClient.connected) mqttClient.publish(MQTT_TOPIC, JSON.stringify(payload), {qos:1});
  if(navigator.vibrate) navigator.vibrate(90);
}

function expiryText(hours){
  const d=new Date(Date.now()+hours*3600*1000);
  return "오늘 "+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false})+" 까지";
}

function beep(freq){
  try{
    const c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='square';
    o.frequency.value=freq; g.gain.value=.06;
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.12);
    o.start();o.stop(c.currentTime+.12);
  }catch(e){}
}

function addLog(p){
  const list=document.getElementById('logList');
  if(list.querySelector('.log-empty')) list.innerHTML='';
  const time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const item=document.createElement('div');
  item.className='log-item';
  item.innerHTML=`<span>${emojiFor(p.cat,p.name)} ${p.name} · ${won(p.discPrice)}</span><span class="t">${time}</span>`;
  list.prepend(item);
}

renderShelf();
initMqtt();
</script>
