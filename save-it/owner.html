<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save-IT 점주용 스캐너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
:root{
  --primary:#13c56b;--primary-d:#0a9d52;--primary-l:#3fe28c;
  --mint:#eafff4;--bg:#f3f6f4;--card:#fff;--text:#16241d;--sub:#7c8b84;--alert:#ff5a5f;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#10241a;min-height:100vh;display:flex;justify-content:center;padding:0}
.wrap{width:100%;max-width:480px;background:var(--bg);min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,.4)}

.header{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;padding:22px 22px 26px}
.header .logo{font-size:20px;font-weight:900;display:flex;align-items:center;gap:8px}
.header .logo i{background:#fff;color:var(--primary);width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.header .role{margin-top:4px;font-size:12.5px;opacity:.9}
.conn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;background:rgba(255,255,255,.18);padding:6px 11px;border-radius:20px;margin-top:12px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#cfd8d3}
.conn-dot.online{background:#aaffcc;box-shadow:0 0 8px #aaffcc;animation:pulse 1.5s infinite}
.conn-dot.connecting{background:#ffb300}
@keyframes pulse{50%{opacity:.35}}

.section{padding:20px}
.section h2{font-size:14px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.section h2 i{color:var(--primary)}

.products{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.prod-card{background:var(--card);border-radius:16px;padding:14px 8px;text-align:center;border:2px solid transparent;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.05);transition:.15s;position:relative}
.prod-card.selected{border-color:var(--primary);background:var(--mint)}
.prod-card .emoji{font-size:30px}
.prod-card .name{font-size:12px;font-weight:700;color:var(--text);margin-top:6px;line-height:1.3}
.prod-card .price{font-size:11px;color:var(--alert);font-weight:700;margin-top:3px}
.prod-card .key{position:absolute;top:6px;left:6px;background:var(--text);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center}

.scan-btn{margin:6px 20px 10px;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;border:none;padding:22px;border-radius:20px;font-size:19px;font-weight:900;width:calc(100% - 40px);cursor:pointer;box-shadow:0 14px 30px rgba(19,197,107,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:.15s}
.scan-btn:active{transform:scale(.97)}
.scan-btn i{font-size:22px}
.scan-flash{animation:flash .35s}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(19,197,107,.6)}100%{box-shadow:0 0 0 30px rgba(19,197,107,0)}}

.shortcut-note{margin:0 20px 20px;background:var(--card);border-radius:14px;padding:13px 15px;font-size:12.5px;color:var(--sub);display:flex;gap:9px;align-items:center;box-shadow:0 6px 16px rgba(0,0,0,.05)}
.shortcut-note kbd{background:var(--text);color:#fff;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;margin:0 2px}

.log{margin:0 20px 30px;background:#0e2017;border-radius:16px;padding:14px 16px;max-height:200px;overflow-y:auto}
.log h3{color:#9fb3a9;font-size:11px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.log-item{color:#e8f5ee;font-size:12.5px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;gap:8px}
.log-item:last-child{border:none}
.log-item .t{color:#5d7a6c;font-size:11px;flex-shrink:0}
.log-empty{color:#5d7a6c;font-size:12px;text-align:center;padding:10px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo"><i class="fas fa-store"></i> Save-IT 점주용</div>
    <div class="role">상품을 스캔하면 즉시 소비자 화면에 알림이 뜹니다</div>
    <div class="conn"><span class="conn-dot connecting" id="connDot"></span><span id="connText">연결 중</span></div>
  </div>

  <div class="section">
    <h2><i class="fas fa-barcode"></i> 스캔할 상품 선택</h2>
    <div class="products" id="productGrid"></div>
  </div>

  <button class="scan-btn" id="scanBtn" onclick="doScan()"><i class="fas fa-bolt"></i> 스캔하기</button>

  <div class="shortcut-note">
    <i class="fas fa-keyboard"></i>
    <div>키보드로도 스캔할 수 있어요 — 숫자 <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> 으로 상품 선택, <kbd>Space</kbd> 또는 <kbd>Enter</kbd> 로 즉시 스캔</div>
  </div>

  <div class="log">
    <h3><i class="fas fa-clock-rotate-left"></i> 스캔 기록</h3>
    <div id="logList"><div class="log-empty">아직 스캔 기록이 없습니다</div></div>
  </div>
</div>

<script>
const MQTT_BROKER="wss://broker.hivemq.com:8884/mqtt";
const MQTT_TOPIC ="saveit/store/gyeyang/scan";
let mqttClient=null;

const PRODUCTS=[
  {emoji:"🍙",name:"참치마요 삼각김밥 3개",price:"1,800원",origPrice:"3,600원",store:"GS25 계양구청점",qty:3,expiry:"오늘 23:00 까지",seconds:5400,dist:"도보 4분 · 320m"},
  {emoji:"🥪",name:"햄치즈 샌드위치 2개",price:"1,950원",origPrice:"3,900원",store:"GS25 계양구청점",qty:2,expiry:"오늘 22:00 까지",seconds:3600,dist:"도보 6분 · 480m"},
  {emoji:"🥛",name:"그릭요거트 1개",price:"1,500원",origPrice:"3,000원",store:"GS25 계양구청점",qty:1,expiry:"오늘 21:00 까지",seconds:2700,dist:"도보 3분 · 210m"}
];
let selected=0;

function setConn(state,text){ document.getElementById('connDot').className='conn-dot '+state; document.getElementById('connText').textContent=text; }

function initMqtt(){
  setConn('connecting','연결 중');
  try{
    mqttClient=mqtt.connect(MQTT_BROKER,{clientId:'saveit-owner-'+Math.random().toString(16).substr(2,8),reconnectPeriod:2000,connectTimeout:8000});
    mqttClient.on('connect',()=>setConn('online','발행 준비 완료'));
    mqttClient.on('reconnect',()=>setConn('connecting','재연결 중'));
    mqttClient.on('offline',()=>setConn('','오프라인'));
    mqttClient.on('error',()=>setConn('','연결 오류'));
  }catch(e){ setConn('','연결 불가'); }
}

function renderProducts(){
  document.getElementById('productGrid').innerHTML=PRODUCTS.map((p,i)=>`
    <div class="prod-card ${i===selected?'selected':''}" onclick="selectProduct(${i})">
      <div class="key">${i+1}</div>
      <div class="emoji">${p.emoji}</div>
      <div class="name">${p.name}</div>
      <div class="price">${p.price}</div>
    </div>`).join('');
}
function selectProduct(i){ selected=i; renderProducts(); }

function doScan(){
  const p=PRODUCTS[selected];
  const payload={
    store:p.store, product:p.name, price:p.price, origPrice:p.origPrice,
    qty:p.qty, expiry:p.expiry, seconds:p.seconds, dist:p.dist,
    scannedAt:new Date().toLocaleTimeString('ko-KR')
  };
  if(mqttClient && mqttClient.connected){
    mqttClient.publish(MQTT_TOPIC, JSON.stringify(payload), {qos:1});
  }
  flashScan();
  addLog(p);
}

function flashScan(){
  const b=document.getElementById('scanBtn');
  b.classList.remove('scan-flash'); void b.offsetWidth; b.classList.add('scan-flash');
  if(navigator.vibrate) navigator.vibrate(80);
}

function addLog(p){
  const list=document.getElementById('logList');
  if(list.querySelector('.log-empty')) list.innerHTML='';
  const time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const item=document.createElement('div');
  item.className='log-item';
  item.innerHTML=`<span>${p.emoji} ${p.name} 발행됨</span><span class="t">${time}</span>`;
  list.prepend(item);
}

/* ===== 키보드 단축키 =====
   1/2/3 : 상품 선택
   Space 또는 Enter : 선택된 상품 즉시 스캔(발행)
*/
document.addEventListener('keydown',(e)=>{
  if(e.key>='1' && e.key<=String(PRODUCTS.length)){
    selectProduct(parseInt(e.key,10)-1);
  } else if(e.code==='Space' || e.key==='Enter'){
    e.preventDefault();
    doScan();
  }
});

renderProducts();
initMqtt();
</script>
</body>
</html>
